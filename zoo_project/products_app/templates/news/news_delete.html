{% extends "base.html" %}
{% load static %}
{% block title_name %}
Удаление новости {{ news.title }}
{% endblock %}
{% block content %}
<div class="container">
        <div class="delete-card">
            <h1>Подтверждение удаления</h1>
            <p>Вы уверены, что хотите удалить новость <span class="news-title">"{{ news.title }}"</span>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit">Да, удалить</button>
                <a href="{% url 'news_list' %}" class="btn-cancel">Отмена</a>
            </form>
        </div>
    </div>
{% endblock content %}
