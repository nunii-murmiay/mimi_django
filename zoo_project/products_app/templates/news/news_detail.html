{% extends "base.html" %}
{% load static %}
{% block title_name %}
{{ news.title }}
{% endblock %}
{% block content %}
<div class="container">
        <div class="news-detail">
            <h1 class="news-title">{{ news.title }}</h1>
            <div class="news-date">{{ news.created_at|date:"d.m.Y" }}</div>
            
            {% if news.image %}
            <div class="news-image">
                <img src="{{ news.image.url }}" alt="{{ news.title }}">
            </div>
            {% endif %}
            
            <div class="news-content">
                {{ news.content|linebreaks }}
            </div>
            
            <div>
                <a href="{% url 'news_list' %}" class="btn-back">← Назад к новостям</a>
                <a href="{% url 'news_update' news.pk %}" class="btn-back">✎ Редактировать</a>
            </div>
        </div>
    </div>
{% endblock content %}
