<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Товары МиМи</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fefaf5;
            color: #2d2a24;
            line-height: 1.4;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header {
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding: 16px 0;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-weight: 700;
            font-size: 1.7rem;
            letter-spacing: -0.3px;
        }

        .logo a {
            text-decoration: none;
            color: inherit;
        }

        .logo span:first-child {
            color: #f9a26c;
            background: #fff0e5;
            padding: 2px 12px 2px 14px;
            border-radius: 40px;
        }

        .logo span:last-child {
            color: #5b3c2b;
            font-size: 1.5rem;
        }

        .nav {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            font-weight: 500;
            color: #4a3a2e;
            transition: 0.2s;
            font-size: 1rem;
        }

        .nav a:hover {
            color: #f28b48;
        }

        .nav a.active {
            color: #f28b48;
            border-bottom: 2px solid #f28b48;
            padding-bottom: 4px;
        }

        .cart-icon {
            background: #fdf3ec;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #2d2a24;
        }

        .cart-badge {
            background: #f28b48;
            color: white;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 40px 0 32px 0;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 40px;
            margin-bottom: 60px;
        }

        .cart-items {
            background: white;
            border-radius: 28px;
            border: 1px solid #f0e4d8;
            overflow: hidden;
        }

        .cart-header {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 0.5fr;
            background: #f9f2eb;
            padding: 16px 20px;
            font-weight: 600;
            color: #5b4a3a;
            border-bottom: 1px solid #e6d8ce;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 0.5fr;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #f0e4d8;
            transition: 0.2s;
        }

        .cart-item:hover {
            background: #fefaf7;
        }

        .item-info h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .item-info p {
            color: #aa9a8a;
            font-size: 0.85rem;
        }

        .item-price {
            font-weight: 600;
            color: #e27737;
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quantity-btn {
            width: 32px;
            height: 32px;
            background: #f6ede6;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .quantity-btn:hover {
            background: #f28b48;
            color: white;
        }

        .quantity-input {
            width: 50px;
            text-align: center;
            font-size: 1rem;
            padding: 6px;
            border: 1px solid #e6d8ce;
            border-radius: 12px;
            font-weight: 500;
        }

        .item-total {
            font-weight: 700;
            color: #2d2a24;
        }

        .remove-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #c4b5a5;
            transition: 0.2s;
        }

        .remove-btn:hover {
            color: #e27737;
        }

        .cart-summary {
            background: white;
            border-radius: 28px;
            border: 1px solid #f0e4d8;
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f9a26c;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin: 20px 0 24px;
            padding-top: 16px;
            border-top: 2px solid #f0e4d8;
            font-weight: 700;
            font-size: 1.4rem;
            color: #e27737;
        }

        .checkout-btn {
            width: 100%;
            background: #f28b48;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .checkout-btn:hover {
            background: #e27737;
            transform: translateY(-2px);
        }

        .empty-cart {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 28px;
            border: 1px solid #f0e4d8;
        }

        .empty-cart h2 {
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: #aa9a8a;
        }

        .empty-cart p {
            margin-bottom: 32px;
            color: #7b6b5c;
        }

        .continue-btn {
            background: #f28b48;
            color: white;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 60px;
            display: inline-block;
            font-weight: 600;
        }

        .footer {
            background: #2e2822;
            color: #e7dbcf;
            border-radius: 48px 48px 0 0;
            padding: 48px 0 32px;
            margin-top: 48px;
        }

        .footer-inner {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 30px;
        }

        .footer-col p {
            margin: 8px 0;
        }

        .footer-col a {
            color: #fbc9a6;
            text-decoration: none;
        }

        @media (max-width: 900px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }
            .cart-header {
                display: none;
            }
            .cart-item {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .item-quantity {
                justify-content: space-between;
            }
            .cart-summary {
                position: static;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo">
            <a href="/"><span>MM</span><span>Зоомагазин</span></a>
        </div>
        <div class="nav">
            <a href="/">Главная</a>
            <a href="/tovar/">Товары</a>
            <a href="/cart/" class="active">Корзина</a>
        </div>
        <a href="/cart/" class="cart-icon">
            Корзина <span class="cart-badge" id="cartCountDisplay">0</span>
        </a>
    </div>
</header>

<main>
    <div class="container">
        <h1 class="page-title">Корзина</h1>
        
        <div id="cartContent"></div>
    </div>
</main>

<footer class="footer">
    <div class="container footer-inner">
        <div class="footer-col">
            <h3 style="color:#fbc9a6;">Товары МиМи</h3>
            <p>Заботливый зоомагазин для кошек, собак и грызунов.</p>
            <p>2026 Все права защищены.</p>
        </div>
        <div class="footer-col">
            <p>+7 (999) 123-45-67</p>
            <p>hello@mimipet.ru</p>
            <p>ул. Пушистая, 15</p>
        </div>
        <div class="footer-col">
            <p><a href="#">О нас</a></p>
            <p><a href="#">Доставка и оплата</a></p>
            <p><a href="#">Контакты</a></p>
        </div>
    </div>
</footer>

<script>
    function getCart() {
        const cart = localStorage.getItem('mimiCart');
        return cart ? JSON.parse(cart) : [];
    }

    function saveCart(cart) {
        localStorage.setItem('mimiCart', JSON.stringify(cart));
        updateCartCount();
        renderCart();
    }

    function updateCartCount() {
        const cart = getCart();
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const badges = document.querySelectorAll('#cartCountDisplay');
        badges.forEach(badge => {
            badge.innerText = totalItems;
        });
    }

    function updateQuantity(itemId, newQuantity) {
        if (newQuantity < 1) {
            removeItem(itemId);
            return;
        }
        
        let cart = getCart();
        const item = cart.find(i => i.id === itemId);
        if (item) {
            item.quantity = newQuantity;
            saveCart(cart);
        }
    }

    function removeItem(itemId) {
        let cart = getCart();
        cart = cart.filter(item => item.id !== itemId);
        saveCart(cart);
        
        const toast = document.createElement('div');
        toast.innerText = 'Товар удален из корзины';
        toast.style.position = 'fixed';
        toast.style.bottom = '24px';
        toast.style.right = '24px';
        toast.style.backgroundColor = '#aa9a8a';
        toast.style.color = 'white';
        toast.style.padding = '12px 20px';
        toast.style.borderRadius = '40px';
        toast.style.fontWeight = '500';
        toast.style.zIndex = '999';
        document.body.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 2000);
    }

    function clearCart() {
        saveCart([]);
        const toast = document.createElement('div');
        toast.innerText = 'Корзина очищена';
        toast.style.position = 'fixed';
        toast.style.bottom = '24px';
        toast.style.right = '24px';
        toast.style.backgroundColor = '#e27737';
        toast.style.color = 'white';
        toast.style.padding = '12px 20px';
        toast.style.borderRadius = '40px';
        toast.style.fontWeight = '500';
        toast.style.zIndex = '999';
        document.body.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 2000);
    }

    function renderCart() {
        const cart = getCart();
        const container = document.getElementById('cartContent');
        
        if (!cart.length) {
            container.innerHTML = `
                <div class="empty-cart">
                    <h2>Корзина пуста</h2>
                    <p>Добавьте товары в корзину, чтобы оформить заказ</p>
                    <a href="/tovar/" class="continue-btn">Перейти к товарам</a>
                </div>
            `;
            return;
        }
        
        let subtotal = 0;
        
        const itemsHtml = cart.map(item => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;
            
            return `
                <div class="cart-item" data-id="${item.id}">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p>${item.price.toLocaleString()} ₽ за шт</p>
                    </div>
                    <div class="item-price">${item.price.toLocaleString()} ₽</div>
                    <div class="item-quantity">
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                        <input type="number" class="quantity-input" value="${item.quantity}" min="1" 
                               onchange="updateQuantity(${item.id}, parseInt(this.value))">
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                    </div>
                    <div class="item-total">${itemTotal.toLocaleString()} ₽</div>
                    <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
                </div>
            `;
        }).join('');
        
        const delivery = subtotal > 2000 ? 0 : 300;
        const total = subtotal + delivery;
        
        container.innerHTML = `
            <div class="cart-layout">
                <div class="cart-items">
                    <div class="cart-header">
                        <span>Товар</span>
                        <span>Цена</span>
                        <span>Количество</span>
                        <span>Сумма</span>
                    </div>
                    ${itemsHtml}
                </div>
                
                <div class="cart-summary">
                    <div class="summary-title">Итого</div>
                    <div class="summary-row">
                        <span>Товары (${cart.reduce((s, i) => s + i.quantity, 0)} шт)</span>
                        <span>${subtotal.toLocaleString()} ₽</span>
                    </div>
                    <div class="summary-row">
                        <span>Доставка</span>
                        <span>${delivery === 0 ? 'Бесплатно' : delivery.toLocaleString() + ' ₽'}</span>
                    </div>
                    <div class="summary-total">
                        <span>К оплате</span>
                        <span>${total.toLocaleString()} ₽</span>
                    </div>
                    <button class="checkout-btn" onclick="checkout()">Оформить заказ</button>
                    <button class="checkout-btn" style="margin-top: 12px; background: #aa9a8a;" onclick="clearCart()">Очистить корзину</button>
                </div>
            </div>
        `;
    }

    function checkout() {
        const cart = getCart();
        if (cart.length === 0) {
            alert('Корзина пуста');
            return;
        }
        
        alert('Заказ оформлен! Спасибо за покупку.\nСумма заказа: ' + 
              cart.reduce((sum, i) => sum + i.price * i.quantity, 0).toLocaleString() + ' ₽');
        saveCart([]);
        renderCart();
    }

    renderCart();
    updateCartCount();
</script>

</body>
</html>
