{% extends "base.html" %}
{% load static %}
{% block title_name %}
Типы товаров
{% endblock %}
{% block content %}
<div class="container">
        <div class="page-header">
            <h1 class="page-title">Типы товаров</h1>
            <a href="{% url 'tovartype_create' %}" class="btn-add">+ Добавить тип</a>
        </div>
        <div class="items-grid">
            {% for item in tovartype_list %}
            <div class="item-card">
                <div class="item-name">{{ item.name }}</div>
                <div class="item-actions">
                    <a href="{% url 'tovartype_detail' item.pk %}" class="btn-detail">Подробнее</a>
                    <a href="{% url 'tovartype_update' item.pk %}" class="btn-detail btn-edit">Изменить</a>
                    <a href="{% url 'tovartype_delete' item.pk %}" class="btn-detail btn-delete">Удалить</a>
                </div>
            </div>
            {% empty %}
            <div class="empty-message">Типов товаров пока нет</div>
            {% endfor %}
        </div>
    </div>
{% endblock content %}
